name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Linux audio build dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Test
        run: go test ./...

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            goos: linux
            goarch: amd64
            binary_name: mcp-notify
            archive_name: mcp-notify-linux-amd64.tar.gz
          - os: windows-latest
            goos: windows
            goarch: amd64
            binary_name: mcp-notify.exe
            archive_name: mcp-notify-windows-amd64.zip
          - os: macos-latest
            goos: darwin
            goarch: amd64
            binary_name: mcp-notify
            archive_name: mcp-notify-macos-amd64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Linux audio build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Build binary
        shell: bash
        run: |
          mkdir -p release-root/sounds
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o release-root/${{ matrix.binary_name }} ./cmd/mcp-notify
          cp README.md LICENSE CHANGELOG.md mcp-config.example.json release-root/
          if [ -d sounds ]; then
            cp -R sounds/. release-root/sounds/
          fi

      - name: Create archive (tar.gz)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          tar -czf ${{ matrix.archive_name }} -C release-root .

      - name: Create archive (zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path release-root\* -DestinationPath ${{ matrix.archive_name }}

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          generate_release_notes: true
